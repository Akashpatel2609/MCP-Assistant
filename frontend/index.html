<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus AI — Spatial Canvas</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Markdown + Syntax Highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" id="highlight-theme" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- Ambient Moving Spatial Background -->
<div class="spatial-canvas" aria-hidden="true">
  <div class="nebula nebula-violet"></div>
  <div class="nebula nebula-blue"></div>
</div>

<!-- ─── SLIDING DRAWER MENU (LEFT SIDEBAR) ─── -->
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<aside class="hamburger-drawer" id="hamburger-drawer">
  <div class="drawer-header">
    <div class="logo-wrapper">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="drawer-brand">Nexus History</span>
    <button class="drawer-close-btn" id="close-drawer-btn" title="Close Drawer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  
  <button class="btn-new-chat" id="new-chat-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    New Chat
  </button>

  <div class="drawer-sessions-list" id="session-list-container">
    <!-- Past chats entries dynamically loaded -->
  </div>
</aside>

<div class="app-container">

  <!-- ─── FLOATING CONTROL DECK (TOP NAV) ─── -->
  <header class="control-deck">
    <div class="deck-left">
      <!-- Hamburger Menu Icon Button -->
      <button class="hamburger-menu-btn" id="open-drawer-btn" title="View Past Chats">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="app-brand-title">NEXUS AI</span>
      <span class="status-indicator" id="system-status-indicator">
        <span class="pulse-ring"></span>
        <span class="status-label">SYS_IDLE</span>
      </span>
    </div>

    <div class="deck-right">
      <span class="active-title-indicator" id="active-session-title">New Chat</span>

      <!-- Theme Switcher -->
      <button class="deck-action-btn theme-toggle" id="theme-toggle-btn" title="Toggle Theme Frame">
        <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ─── SPATIAL CONVERSATION ARENA ─── -->
  <main class="chat-viewport">
    <div class="scroll-wrapper" id="message-scroller">
      
      <!-- Spatial Welcome Canvas -->
      <div class="canvas-welcome" id="welcome-hero-panel">
        <div class="welcome-heading-wrapper">
          <h1 class="welcome-heading">Intelligence Connected.</h1>
        </div>
        <p class="welcome-tagline">Nexus connects files, media, databases, and the web into a singular semantic workspace.</p>
        
        <div class="suggest-deck" id="suggestion-pills-container">
          <!-- Suggested triggers -->
        </div>
      </div>

    </div>
  </main>

  <!-- ─── FLOATING ACTION DOCK (INPUT ZONE) ─── -->
  <footer class="input-dock-container">
    <div class="drag-zone-overlay" id="drag-overlay-panel">
      <div class="drag-message">Drop Files Anywhere to Ingest</div>
    </div>

    <!-- Active uploads trace -->
    <div class="upload-progress-tray" id="active-upload-chips"></div>

    <!-- Dynamic Attachment Pop-Menu -->
    <div class="dock-pop-menu" id="attach-pop-menu">
      <button class="pop-menu-item" id="pop-opt-file">
        <span class="pop-icon">📁</span>
        <div class="pop-details">
          <span class="pop-title">Ingest Document</span>
          <span class="pop-desc">Upload PDF, DOCX, TXT into RAG</span>
        </div>
      </button>
      <button class="pop-menu-item" id="pop-opt-media">
        <span class="pop-icon">🖼️</span>
        <div class="pop-details">
          <span class="pop-title">Attach Media</span>
          <span class="pop-desc">Ingest images and media context</span>
        </div>
      </button>
      <button class="pop-menu-item" id="pop-opt-web">
        <span class="pop-icon">🌐</span>
        <div class="pop-details">
          <span class="pop-title">Connect Web URL</span>
          <span class="pop-desc">Fetch and index a web page</span>
        </div>
      </button>
    </div>

    <!-- Master Input Console -->
    <div class="console-box">
      <button class="console-action-btn" id="console-attach-trigger" title="Attach context sources">
        <svg class="plus-symbol" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>

      <textarea 
        id="query-text-input" 
        placeholder="Query files, scan databases, browse the web, execute code..."
        rows="1"
      ></textarea>

      <button class="console-send-btn" id="submit-query-btn" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <!-- Mini loading trace -->
    <div class="live-activity-bar" id="agent-active-status" style="display: none;">
      <span class="pulse-indicator"></span>
      <span class="activity-label" id="agent-status-text">Thinking...</span>
    </div>
  </footer>

</div>

<!-- Context URL Input Modal -->
<div class="modal-backdrop" id="url-modal" style="display:none">
  <div class="glass-modal">
    <h3>🌐 Connect Web URL</h3>
    <p>Scrape and index a live web page directly into the Qdrant database index.</p>
    <input type="url" id="modal-url-input" placeholder="https://example.com/article" />
    <div class="modal-actions">
      <button class="modal-btn cancel" id="close-url-modal">Cancel</button>
      <button class="modal-btn confirm" id="submit-url-modal">Scrape & Index</button>
    </div>
  </div>
</div>

<input type="file" id="hidden-file-input" style="display:none" accept=".txt,.csv,.py,.json,.md,.js,.ts,.html,.css,.pdf,.docx" multiple />
<input type="file" id="hidden-media-input" style="display:none" accept="image/*" multiple />
<div class="toast-board" id="toast-wrapper"></div>

<script src="/static/app.js"></script>
</body>
</html>
