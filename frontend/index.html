<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus AI</title>
  <meta name="description" content="Clean, minimalist conversational interface powered by MCP and Vector RAG." />

  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Markdown & Syntax Highlight -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div class="app">
  <!-- ─── Collapsible Sidebar ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <svg class="brand-logo" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span class="brand-name">Nexus AI</span>
      </div>
      <button class="btn-toggle-sidebar" id="close-sidebar-btn" title="Hide Sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </div>

    <button class="btn-new-chat" id="new-chat-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Chat
    </button>

    <div class="session-list-container" id="session-list-container">
      <!-- Chat history items will render here dynamically -->
    </div>
  </aside>

  <!-- ─── Main Conversational Space ─── -->
  <main class="main-content">
    <header class="top-nav">
      <button class="btn-menu" id="open-sidebar-btn" title="Open Sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="active-title" id="active-session-title">New Chat</div>
      <div class="system-status" id="system-status-indicator">
        <span class="status-dot"></span>
        <span class="status-text">Idle</span>
      </div>
    </header>

    <!-- Message Scroll Area -->
    <div class="scroll-container" id="message-scroller">
      
      <!-- Minimalist Hero welcome -->
      <div class="welcome-hero" id="welcome-hero-panel">
        <h1 class="welcome-title">How can I help you today?</h1>
        <p class="welcome-subtitle">Ask questions, query databases, upload files to index context, or execute Python code.</p>
        
        <div class="suggestions" id="suggestion-pills-container">
          <!-- Suggestion pills injected here -->
        </div>
      </div>

    </div>

    <!-- Clean Input Box at Bottom -->
    <div class="input-container">
      <div class="drag-overlay" id="drag-overlay-panel">
        <div class="drag-text">Drop files anywhere to index context</div>
      </div>

      <div class="upload-chips" id="active-upload-chips"></div>

      <div class="input-wrapper">
        <button class="btn-attachment" id="attach-document-btn" title="Attach Document (PDF, Word, Code)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>

        <textarea 
          id="query-text-input" 
          placeholder="Send a message, search, run code, or ask DB..." 
          rows="1"
        ></textarea>

        <button class="btn-send" id="submit-query-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      
      <!-- Minimalist Loading Indicator -->
      <div class="loading-indicator" id="agent-active-status" style="display: none;">
        <span class="loading-dots"></span>
        <span class="loading-label" id="agent-status-text">Thinking...</span>
      </div>
    </div>
  </main>
</div>

<input type="file" id="hidden-file-input" style="display:none" accept=".txt,.csv,.py,.json,.md,.js,.ts,.html,.css,.pdf,.docx" multiple />
<div class="toast-container" id="toast-wrapper"></div>

<script src="/static/app.js"></script>
</body>
</html>
